<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#152820" />
    <meta name="description" content="매장별 타사 온라인 주문 SLA 예외관리 시스템" />
    <link rel="manifest" href="%BASE_URL%ledger.webmanifest?v=20260723-2" />
    <link rel="icon" href="%BASE_URL%ledger-icon-192.png" />
    <script>
      window.__ledgerInstallPrompt = null
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault()
        window.__ledgerInstallPrompt = event
        window.dispatchEvent(new Event('ledger-install-ready'))
      })
    </script>
    <title>타사 온라인 예외관리</title>
